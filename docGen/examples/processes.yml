processes:
  - id: order-submission
    name: Order Submission
    entrypoints:
      - com.example.order:submitOrder
    business_description: >
      Receives an order request, validates customer data, creates an invoice,
      and records that an audit/event publication step is dynamically invoked.
    owners:
      - Order Management Team
      - Integration Team
    tags:
      - order
      - billing
      - example
    business_steps:
      - name: Receive request
        description: Accept the order submission request and orchestrate downstream work.
        services:
          - com.example.order:submitOrder
      - name: Validate customer
        description: Confirm that customer data is usable before billing.
        services:
          - com.example.customer:validateCustomer
      - name: Create invoice
        description: Create an invoice using a Java service whose implementation source is unresolved in this sample.
        services:
          - com.example.billing:createInvoice
